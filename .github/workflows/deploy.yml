name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main   # Runs automatically on every push to main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grants permission to push the built site to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node.js 24 to avoid Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one deployment runs at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Flutter (pinned to match local dev environment exactly)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build the Flutter Web app
      #    --base-href must match your repo name so asset paths work correctly
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/MyPortfolio/"

      # 5. Upload the built site as a Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
